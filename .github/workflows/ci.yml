name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crystal: ['1.19.1']
    steps:
      - uses: actions/checkout@v4
      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{ matrix.crystal }}
      - name: Install dependencies
        run: shards install
      - name: Check format
        run: crystal tool format --check
      - name: Run tests
        run: crystal spec
      - name: Build check
        run: crystal build src/google-api-client-cr.cr --no-codegen
